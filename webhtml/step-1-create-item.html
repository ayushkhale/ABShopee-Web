<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Create Catalog Item – Step 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Colors */
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #6366f1;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --warning: #f97316;
            
            /* Text */
            --text-dark: #111827;
            --text-medium: #374151;
            --text-light: #6b7280;
            --text-lighter: #9ca3af;
            
            /* Background */
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            
            /* Border */
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            
            /* Shadows */
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            
            /* Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ==================== HEADER ==================== */
        .app-header {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            padding: 2rem 1.5rem;
            box-shadow: var(--shadow-xl);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .brand-text h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: white;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .brand-text p {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
        }

        /* ==================== MAIN CONTAINER ==================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .card {
            background: var(--bg-primary);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        /* ==================== SECTIONS ==================== */
        .section {
            margin-bottom: 2rem;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-light);
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: var(--primary);
        }

        /* ==================== FORM ELEMENTS ==================== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-medium);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .form-label .required {
            color: var(--danger);
        }

        .form-input,
        .form-select,
        .form-textarea {
            padding: 0.875rem 1.25rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 500;
            background: var(--bg-secondary);
            transition: all 0.2s;
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* ==================== CATEGORY SECTION ==================== */
        .category-selection-wrapper {
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            background: var(--bg-secondary);
        }

        .category-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .category-search-wrapper {
            position: relative;
            flex: 1;
            margin-right: 1rem;
        }

        .category-search-input {
            width: 100%;
            padding: 0.625rem 1rem;
            padding-left: 2.5rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            background: white;
            transition: all 0.2s;
        }

        .category-search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-lighter);
            pointer-events: none;
        }

        .category-search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-expand-all,
        .btn-collapse-all {
            padding: 0.5rem 1rem;
            background: white;
            color: var(--text-medium);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-expand-all:hover,
        .btn-collapse-all:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }

        .category-tree-container {
            max-height: 400px;
            overflow-y: auto;
            padding: 0.5rem;
            background: white;
            border-radius: var(--radius-md);
        }

        .category-tree-container::-webkit-scrollbar {
            width: 8px;
        }

        .category-tree-container::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .category-tree-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .category-tree-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-lighter);
        }

        .category-tree-node {
            margin-bottom: 0.25rem;
        }

        .category-tree-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .category-tree-item:hover {
            background: var(--bg-secondary);
        }

        .category-tree-item.selected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            font-weight: 600;
        }

        .category-tree-item.has-match {
            background: rgba(79, 70, 229, 0.05);
        }

        .category-checkbox {
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        .category-expand-btn {
            width: 1rem;
            height: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            color: var(--text-medium);
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .category-expand-btn.expanded {
            transform: rotate(90deg);
        }

        .category-expand-btn.invisible {
            opacity: 0;
            pointer-events: none;
        }

        .category-tree-item.selected .category-expand-btn {
            color: white;
        }

        .category-tree-label {
            flex: 1;
            font-size: 0.875rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .category-tree-count {
            font-size: 0.75rem;
            padding: 0.125rem 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 999px;
            color: var(--text-light);
            font-weight: 600;
            flex-shrink: 0;
        }

        .category-tree-item.selected .category-tree-count {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .category-tree-children {
            margin-left: 1.75rem;
            margin-top: 0.25rem;
            padding-left: 0.75rem;
            border-left: 2px solid var(--border-light);
        }

        .category-tree-children.collapsed {
            display: none;
        }

        .category-empty-state {
            padding: 2rem 1rem;
            text-align: center;
            color: var(--text-lighter);
            font-size: 0.875rem;
        }

        .category-empty-state i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
            opacity: 0.5;
        }

        /* Selected Categories Display */
        .selected-categories-display {
            margin-top: 1rem;
            padding: 1rem;
            background: white;
            border-radius: var(--radius-md);
            border: 2px dashed var(--border);
        }

        .selected-categories-header {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-medium);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .selected-count {
            color: var(--primary);
        }

        .selected-categories-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .selected-categories-chips.empty::before {
            content: 'No categories selected yet. Select from the tree above.';
            color: var(--text-lighter);
            font-size: 0.875rem;
            font-style: italic;
        }

        .category-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: white;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .category-chip:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .chip-remove {
            width: 1rem;
            height: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .chip-remove:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-medium);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border);
        }

        .btn-success {
            background: var(--secondary);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* ==================== ACTIONS ==================== */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-light);
        }

        /* ==================== STATUS MESSAGES ==================== */
        .status-message {
            margin-top: 1rem;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 0.75rem;
        }

        .status-message.show {
            display: flex;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #fca5a5;
        }

        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #6ee7b7;
        }

        .status-message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 2px solid #93c5fd;
        }

        /* ==================== LOADING OVERLAY ==================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 4rem;
            height: 4rem;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .app-header {
                padding: 1.5rem 1rem;
            }

            .brand-text h1 {
                font-size: 1.5rem;
            }

            .container {
                padding: 1.5rem 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column-reverse;
            }

            .btn {
                width: 100%;
            }

            .category-controls {
                flex-direction: column;
                gap: 0.75rem;
            }

            .category-search-wrapper {
                margin-right: 0;
                width: 100%;
            }

            .btn-expand-all,
            .btn-collapse-all {
                width: 100%;
            }
        }

        /* ==================== UTILITIES ==================== */
        .hidden {
            display: none !important;
        }

        .text-muted {
            color: var(--text-light);
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- App Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <div class="brand-text">
                    <h1>Create Catalog Item</h1>
                    <p>Step 1 – Item details, pricing & categories</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <div class="card">
            <form id="itemForm">
                <!-- BUSINESS SECTION -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-building"></i>
                            Business Information
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group full">
                            <label class="form-label">
                                Business ID
                                <span class="required">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="businessId" 
                                class="form-input"
                                required 
                                placeholder="Enter business UUID"
                            />
                        </div>
                    </div>
                </div>

                <!-- ITEM DETAILS SECTION -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-box"></i>
                            Item Details
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group full">
                            <label class="form-label">
                                Title
                                <span class="required">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="title" 
                                class="form-input"
                                required
                                placeholder="Enter item title"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                Item Type
                                <span class="required">*</span>
                            </label>
                            <select id="itemType" class="form-select" required>
                                <option value="">Select type</option>
                                <option value="physical">Physical</option>
                                <option value="digital">Digital</option>
                                <option value="service">Service</option>
                            </select>
                        </div>

                        <div class="form-group full">
                            <label class="form-label">
                                Description
                            </label>
                            <textarea 
                                id="description" 
                                class="form-textarea"
                                placeholder="Enter item description (optional)"
                            ></textarea>
                        </div>

                        <div class="form-group full">
                            <label class="form-label">
                                Metadata (JSON)
                            </label>
                            <textarea 
                                id="metadata" 
                                class="form-textarea"
                                placeholder='{"key": "value"}'
                            ></textarea>
                        </div>
                    </div>
                </div>

                <!-- CATEGORIES SECTION -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-sitemap"></i>
                            Categories (Optional)
                        </div>
                    </div>
                    
                    <div class="category-selection-wrapper">
                        <div class="category-controls">
                            <div class="category-search-wrapper">
                                <i class="fas fa-search category-search-icon"></i>
                                <input 
                                    type="text" 
                                    class="category-search-input" 
                                    id="categorySearchInput"
                                    placeholder="Search categories..."
                                    oninput="searchCategories(this.value)"
                                />
                            </div>
                            <button type="button" class="btn-expand-all" onclick="expandAllCategories()">
                                <i class="fas fa-plus-square"></i> Expand All
                            </button>
                        </div>

                        <div class="category-tree-container" id="categoryTreeContainer">
                            <div class="category-empty-state">
                                <i class="fas fa-folder-open"></i>
                                <p>Enter a Business ID above to load categories</p>
                            </div>
                        </div>

                        <div class="selected-categories-display">
                            <div class="selected-categories-header">
                                <span>Selected Categories</span>
                                <span class="selected-count">(<span id="selectedCount">0</span> selected)</span>
                            </div>
                            <div class="selected-categories-chips empty" id="selectedCategoriesChips">
                                <!-- Selected category chips will appear here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PRICING SECTION -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-dollar-sign"></i>
                            Pricing
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">
                                Amount
                                <span class="required">*</span>
                            </label>
                            <input 
                                type="number" 
                                id="priceAmount" 
                                class="form-input"
                                required
                                min="0"
                                step="0.01"
                                placeholder="0.00"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                Currency
                                <span class="required">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="currency" 
                                class="form-input"
                                value="INR" 
                                required
                                placeholder="INR"
                            />
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                Price Type
                            </label>
                            <select id="priceType" class="form-select">
                                <option value="one_time">One Time</option>
                                <option value="subscription">Subscription</option>
                            </select>
                        </div>

                        <div class="form-group full">
                            <label class="form-label">
                                Price Metadata (JSON)
                            </label>
                            <textarea 
                                id="priceMetadata" 
                                class="form-textarea"
                                placeholder='{"key": "value"}'
                            ></textarea>
                        </div>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="actions">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        <i class="fas fa-undo"></i>
                        Reset Form
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i>
                        Create Item
                    </button>
                </div>

                <div class="status-message" id="statusMessage"></div>
            </form>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const API_BASE_URL = 'http://localhost:9100/seller';

        // ==================== STATE MANAGEMENT ====================
        let categoryData = [];
        let selectedCategories = new Map(); // id -> {id, name}
        let expandedCategoryNodes = new Set();

        // ==================== UTILITY FUNCTIONS ====================
        function showLoading(show = true) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('show');
            } else {
                overlay.classList.remove('show');
            }
        }

        function showStatus(message, type = 'info') {
            const element = document.getElementById('statusMessage');
            element.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
            element.className = `status-message show ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    element.classList.remove('show');
                }, 5000);
            }
        }

        function hideStatus() {
            document.getElementById('statusMessage').classList.remove('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function parseJson(val) {
            if (!val || val.trim() === '') return {};
            try {
                return JSON.parse(val);
            } catch (e) {
                throw new Error('Invalid JSON format');
            }
        }

        // ==================== CATEGORY FUNCTIONS ====================
        async function loadCategories() {
            const businessId = document.getElementById('businessId').value.trim();
            if (!businessId) return;

            const container = document.getElementById('categoryTreeContainer');
            container.innerHTML = `
                <div class="category-empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading categories...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE_URL}/business/${businessId}/categories`);
                const json = await response.json();

                if (!response.ok || !json.success) {
                    throw new Error(json.message || 'Failed to load categories');
                }

                categoryData = json.data || [];
                
                if (categoryData.length === 0) {
                    container.innerHTML = `
                        <div class="category-empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>No categories available for this business</p>
                        </div>
                    `;
                } else {
                    renderCategoryTree();
                }
            } catch (error) {
                console.error('Error loading categories:', error);
                container.innerHTML = `
                    <div class="category-empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p style="color: var(--danger);">${error.message}</p>
                    </div>
                `;
            }
        }

        function renderCategoryTree(searchTerm = '') {
            const container = document.getElementById('categoryTreeContainer');
            
            if (categoryData.length === 0) {
                container.innerHTML = `
                    <div class="category-empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>No categories available</p>
                    </div>
                `;
                return;
            }

            const filteredData = searchTerm ? filterCategories(categoryData, searchTerm) : categoryData;
            
            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="category-empty-state">
                        <i class="fas fa-search"></i>
                        <p>No matching categories found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredData.map(cat => renderCategoryNode(cat, searchTerm)).join('');
        }

        function filterCategories(categories, searchTerm) {
            const term = searchTerm.toLowerCase();
            const results = [];

            function search(cats) {
                const matched = [];
                cats.forEach(cat => {
                    const matches = cat.name.toLowerCase().includes(term);
                    const childMatches = cat.children && cat.children.length > 0 ? search(cat.children) : [];
                    
                    if (matches || childMatches.length > 0) {
                        matched.push({
                            ...cat,
                            children: childMatches.length > 0 ? childMatches : cat.children,
                            hasMatch: matches
                        });
                    }
                });
                return matched;
            }

            return search(categories);
        }

        function renderCategoryNode(category, searchTerm = '') {
            const hasChildren = category.children && category.children.length > 0;
            const isExpanded = expandedCategoryNodes.has(category.id) || searchTerm !== '';
            const isSelected = selectedCategories.has(category.id);
            const hasMatch = category.hasMatch || false;

            let html = `<div class="category-tree-node">`;
            html += `<div class="category-tree-item ${isSelected ? 'selected' : ''} ${hasMatch ? 'has-match' : ''}">`;
            
            // Checkbox
            html += `<input type="checkbox" class="category-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleCategorySelection('${category.id}', '${escapeHtml(category.name)}')">`;
            
            // Expand button
            if (hasChildren) {
                html += `<div class="category-expand-btn ${isExpanded ? 'expanded' : ''}" onclick="toggleCategoryExpand('${category.id}')">
                    <i class="fas fa-chevron-right"></i>
                </div>`;
            } else {
                html += `<div class="category-expand-btn invisible"></div>`;
            }
            
            // Label
            html += `<span class="category-tree-label" onclick="toggleCategorySelection('${category.id}', '${escapeHtml(category.name)}')">${escapeHtml(category.name)}</span>`;
            
            // Count badge
            if (hasChildren) {
                html += `<span class="category-tree-count">${category.children.length}</span>`;
            }
            
            html += `</div>`;

            // Children
            if (hasChildren) {
                html += `<div class="category-tree-children ${isExpanded ? '' : 'collapsed'}" id="cat-children-${category.id}">`;
                html += category.children.map(child => renderCategoryNode(child, searchTerm)).join('');
                html += `</div>`;
            }

            html += `</div>`;
            return html;
        }

        function toggleCategorySelection(categoryId, categoryName) {
            if (selectedCategories.has(categoryId)) {
                selectedCategories.delete(categoryId);
            } else {
                selectedCategories.set(categoryId, { id: categoryId, name: categoryName });
            }
            
            updateSelectedDisplay();
            renderCategoryTree(document.getElementById('categorySearchInput').value);
        }

        function toggleCategoryExpand(categoryId) {
            if (expandedCategoryNodes.has(categoryId)) {
                expandedCategoryNodes.delete(categoryId);
            } else {
                expandedCategoryNodes.add(categoryId);
            }
            renderCategoryTree(document.getElementById('categorySearchInput').value);
        }

        function searchCategories(searchTerm) {
            renderCategoryTree(searchTerm);
            if (searchTerm) {
                expandAllInTree();
            }
        }

        function expandAllCategories() {
            expandAllInTree();
            renderCategoryTree(document.getElementById('categorySearchInput').value);
        }

        function expandAllInTree() {
            function expandNode(category) {
                if (category.children && category.children.length > 0) {
                    expandedCategoryNodes.add(category.id);
                    category.children.forEach(child => expandNode(child));
                }
            }
            categoryData.forEach(cat => expandNode(cat));
        }

        function updateSelectedDisplay() {
            const container = document.getElementById('selectedCategoriesChips');
            const count = document.getElementById('selectedCount');
            
            count.textContent = selectedCategories.size;
            
            if (selectedCategories.size === 0) {
                container.innerHTML = '';
                container.classList.add('empty');
                return;
            }
            
            container.classList.remove('empty');
            
            const chips = Array.from(selectedCategories.values()).map(cat => `
                <div class="category-chip">
                    <span>${escapeHtml(cat.name)}</span>
                    <div class="chip-remove" onclick="removeCategory('${cat.id}')">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = chips;
        }

        function removeCategory(categoryId) {
            selectedCategories.delete(categoryId);
            updateSelectedDisplay();
            renderCategoryTree(document.getElementById('categorySearchInput').value);
        }

        // ==================== BUSINESS ID BLUR EVENT ====================
        document.getElementById('businessId').addEventListener('blur', () => {
            loadCategories();
        });

        // ==================== FORM SUBMISSION ====================
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideStatus();
            showLoading(true);

            try {
                // Validate and parse JSON fields
                const metadata = parseJson(document.getElementById('metadata').value);
                const priceMetadata = parseJson(document.getElementById('priceMetadata').value);

                const payload = {
                    title: document.getElementById('title').value.trim(),
                    itemType: document.getElementById('itemType').value,
                    description: document.getElementById('description').value.trim() || null,
                    metadata: metadata,
                    price: {
                        amount: Number(document.getElementById('priceAmount').value),
                        currency: document.getElementById('currency').value.trim(),
                        priceType: document.getElementById('priceType').value,
                        metadata: priceMetadata
                    }
                };

                if (selectedCategories.size > 0) {
                    payload.categoryIds = Array.from(selectedCategories.keys());
                }

                const businessId = document.getElementById('businessId').value.trim();

                const response = await fetch(
                    `${API_BASE_URL}/business/${businessId}/items`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }
                );

                const json = await response.json();

                if (!response.ok || !json.success) {
                    throw new Error(json.message || 'Failed to create item');
                }

                showStatus('Item created successfully! You can create another item or view your inventory.', 'success');
                
                // Optional: Reset form after successful creation
                // resetForm();

            } catch (err) {
                console.error('Error:', err);
                showStatus(err.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // ==================== FORM RESET ====================
        function resetForm() {
            document.getElementById('itemForm').reset();
            selectedCategories.clear();
            expandedCategoryNodes.clear();
            updateSelectedDisplay();
            document.getElementById('categorySearchInput').value = '';
            document.getElementById('categoryTreeContainer').innerHTML = `
                <div class="category-empty-state">
                    <i class="fas fa-folder-open"></i>
                    <p>Enter a Business ID above to load categories</p>
                </div>
            `;
            hideStatus();
        }

        // ==================== KEYBOARD SUPPORT ====================
        document.getElementById('businessId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loadCategories();
            }
        });
    </script>
</body>
</html>
