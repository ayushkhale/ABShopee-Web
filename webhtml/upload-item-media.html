<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Item Media</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f3f4f6;
      padding: 40px;
    }

    .card {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    h1 {
      margin-top: 0;
      font-size: 20px;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    input[type="file"] {
      padding: 8px;
      background: #f9fafb;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
    }

    button:hover {
      background: #4338ca;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
    }

    .error { color: #dc2626 }
    .success { color: #059669 }
  </style>
</head>

<body>

<div class="card">
  <h1>Upload Item Media</h1>

  <div class="field">
    <label>Business ID *</label>
    <input id="businessId" placeholder="Business UUID" />
  </div>

  <div class="field">
    <label>Item ID *</label>
    <input id="itemId" placeholder="Catalog Item UUID" />
  </div>

  <div class="field">
    <label>Media Type *</label>
    <select id="role">
      <option value="gallery">Gallery Images / Videos (up to 5)</option>
      <option value="primary">Primary Image (exactly 1 image)</option>
    </select>
    <div class="hint">
      Primary replaces existing primary image. Gallery supports images & videos.
    </div>
  </div>

  <div class="field">
    <label>Select Files (max 5)</label>
    <input
      id="files"
      type="file"
      multiple
      accept="image/*,video/*"
    />
    <div class="hint">
      Images (jpg, png, webp) and videos (mp4). Max 5 files.
    </div>
  </div>

  <button onclick="uploadMedia()">Upload Media</button>

  <div id="status" class="status"></div>
</div>

<script>
  async function uploadMedia() {
    const businessId = document.getElementById('businessId').value.trim()
    const itemId = document.getElementById('itemId').value.trim()
    const role = document.getElementById('role').value
    const filesInput = document.getElementById('files')
    const statusEl = document.getElementById('status')

    statusEl.textContent = ''
    statusEl.className = 'status'

    if (!businessId || !itemId) {
      return setError('Business ID and Item ID are required')
    }

    const files = Array.from(filesInput.files)

    if (files.length === 0) {
      return setError('Please select at least one file')
    }

    if (files.length > 5) {
      return setError('Maximum 5 files allowed')
    }

    if (role === 'primary') {
      if (files.length !== 1) {
        return setError('Primary media must be exactly one file')
      }

      if (!files[0].type.startsWith('image/')) {
        return setError('Primary media must be an image')
      }
    }

    const formData = new FormData()
    formData.append('role', role)

    files.forEach(file => {
      formData.append('files', file)
    })

    setStatus('Uploading media...')

    try {
      const res = await fetch(
        `http://localhost:9100/seller/business/${businessId}/items/${itemId}/media`,
        {
          method: 'POST',
          body: formData
        }
      )

      const json = await res.json()

      if (!res.ok || !json.success) {
        throw new Error(json.message || 'Upload failed')
      }

      setSuccess('Media uploaded successfully')

      filesInput.value = ''

    } catch (err) {
      setError(err.message)
    }
  }

  function setError(msg) {
    const el = document.getElementById('status')
    el.textContent = msg
    el.className = 'status error'
  }

  function setSuccess(msg) {
    const el = document.getElementById('status')
    el.textContent = msg
    el.className = 'status success'
  }

  function setStatus(msg) {
    const el = document.getElementById('status')
    el.textContent = msg
    el.className = 'status'
  }
</script>

</body>
</html>
