<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Inventory – Step 3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --bg: #f3f4f6;
      --card: #ffffff;
      --border: #e5e7eb;
      --text-dark: #111827;
      --text-medium: #374151;
      --text-light: #6b7280;
      --success: #10b981;
      --danger: #ef4444;

      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;

      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1);
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: var(--text-dark);
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--primary), #6366f1);
      padding: 2rem 1.5rem;
      box-shadow: var(--shadow-xl);
      color: white;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    header p {
      margin-top: .25rem;
      font-size: .875rem;
      color: rgba(255,255,255,.85);
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 2rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      border-left: 4px solid var(--primary);
      padding-left: .75rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: .875rem;
      font-weight: 600;
      color: var(--text-medium);
      margin-bottom: .375rem;
      display: block;
    }

    input {
      width: 100%;
      padding: .75rem 1rem;
      border-radius: var(--radius-md);
      border: 2px solid var(--border);
      font-size: .875rem;
      background: #f9fafb;
      transition: all .15s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .radio-group {
      display: flex;
      gap: 2rem;
      padding: .75rem 1rem;
      background: #f9fafb;
      border-radius: var(--radius-md);
      border: 2px solid var(--border);
    }

    .radio-group label {
      font-weight: 600;
      color: var(--text-medium);
      cursor: pointer;
    }

    .radio-group input {
      accent-color: var(--primary);
      margin-right: .5rem;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      margin-top: 2.5rem;
      gap: 1rem;
    }

    button {
      padding: .875rem 1.75rem;
      border-radius: var(--radius-lg);
      border: none;
      font-size: .875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }

    button.primary {
      background: var(--primary);
      color: white;
    }

    button.primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    button.secondary {
      background: #eef2ff;
      color: var(--primary);
    }

    button.secondary:hover {
      background: #e0e7ff;
    }

    .status {
      margin-top: 1rem;
      font-size: .875rem;
      font-weight: 600;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    .hidden { display: none; }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .actions { flex-direction: column-reverse; }
    }
  </style>
</head>

<body>

<header>
  <h1>Add Inventory</h1>
  <p>Step 3 of 3 – Stock & availability</p>
</header>

<main>
  <div class="card">

    <!-- CONTEXT -->
    <div class="section">
      <h2>Context</h2>
      <div class="row">
        <div>
          <label>Business ID *</label>
          <input id="businessId" placeholder="Business UUID" />
        </div>
        <div>
          <label>Item ID *</label>
          <input id="itemId" placeholder="Catalog Item UUID" />
        </div>
      </div>
    </div>

    <!-- MODE -->
    <div class="section">
      <h2>Inventory Mode</h2>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="simple" checked /> No Variant</label>
        <label><input type="radio" name="mode" value="variant" /> Variant Based</label>
      </div>
    </div>

    <!-- VARIANT -->
    <div class="section hidden" id="variantSection">
      <h2>Variant</h2>
      <label>Variant ID (UUID)</label>
      <input id="variantId" placeholder="Variant UUID" />
    </div>

    <!-- QUANTITY -->
    <div class="section">
      <h2>Quantity</h2>
      <label>Available Quantity *</label>
      <input id="quantityAvailable" type="number" min="0" step="1" />
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="secondary" onclick="goBack()">← Back</button>
      <button class="primary" onclick="submitInventory()">Add Inventory</button>
    </div>

    <div id="status" class="status"></div>

  </div>
</main>

<script>
  /* 🔒 LOGIC UNCHANGED */
  const modeRadios = document.querySelectorAll('input[name="mode"]')
  const variantSection = document.getElementById('variantSection')
  const statusEl = document.getElementById('status')

  modeRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      variantSection.classList.toggle(
        'hidden',
        radio.value !== 'variant'
      )
    })
  })

  async function submitInventory() {
    const businessId = businessIdInput()
    const itemId = itemIdInput()
    const quantity = Number(document.getElementById('quantityAvailable').value)
    const mode = document.querySelector('input[name="mode"]:checked').value

    if (!businessId || !itemId) return setError('Business ID and Item ID are required')
    if (!Number.isInteger(quantity) || quantity < 0) return setError('Quantity must be a non-negative integer')

    let variantId = null
    if (mode === 'variant') {
      variantId = document.getElementById('variantId').value.trim()
      if (!variantId) return setError('Variant ID is required for variant mode')
    }

    setStatus('Adding inventory...')

    try {
      const res = await fetch(
        `http://localhost:9100/seller/business/${businessId}/inventory/${itemId}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ variantId, quantityAvailable: quantity })
        }
      )

      const json = await res.json()
      if (!res.ok || !json.success) throw new Error(json.message || 'Failed')

      setSuccess('Inventory added successfully')
    } catch (err) {
      setError(err.message)
    }
  }

  function businessIdInput(){ return document.getElementById('businessId').value.trim() }
  function itemIdInput(){ return document.getElementById('itemId').value.trim() }

  function setError(msg){ statusEl.textContent = msg; statusEl.className = 'status error' }
  function setSuccess(msg){ statusEl.textContent = msg; statusEl.className = 'status success' }
  function setStatus(msg){ statusEl.textContent = msg; statusEl.className = 'status' }

  function goBack(){
    alert('Go back to Step 2')
    window.location.href = '/attach-categories-step2.html'
  }
</script>

</body>
</html>
